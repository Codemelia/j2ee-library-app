<!DOCTYPE html>
<html lang="en">
	
	<head>
		<meta charset="UTF-8">
		<title>BookShelf - Add Book</title>
		<style>
			.form {
				display: flex;
				flex-direction: column;
				gap: 5px;
				align-items: flex-start;
			}
			.error {
				color: red;
				font-size: 0.9em;
				font-style: italic;
			}
		</style>
	</head>
	
	<body>
		<h1>Add a New Book</h1>
		
		<form class="form"
			th:action="@{/books/add}"
			th:object="${book}"
			method="POST"
			novalidate>
			<div class="error" th:if="${#fields.hasAnyErrors()}">
				<p>Book save was unsuccessful due to the following errors:</p>
				<ul>
					<li th:each="err : ${#fields.allErrors()}"
						th:text="${err}"></li>
				</ul>
			</div>
			<div>
				<label for="title">Title: </label>
				<input type="text" th:field="*{title}" required>
				<!-- <span class="error" th:if="${#fields.hasErrors('title')}"
					th:errors="*{title}"></span> -->
			</div>
			<div>
				<label for="author">Author: </label>
				<input type="text" th:field="*{author}" required>
				<!-- <span class="error" th:if="${#fields.hasErrors('author')}"
					th:errors="*{author}"></span> -->
			</div>
			<div>
				<label for="year">Year: </label>
				<input type="number" th:field="*{year}" 
					min="1000" max="2099" required>
				<!-- <span class="error" th:if="${#fields.hasErrors('year')}"
					th:errors="*{year}"></span> -->
			</div>
			<div>
				<label for="genre">Genre: </label>
				<select th:field="*{genre}">
					<option value="">-- Choose genre --</option>
					<option value="fiction">Fiction</option>
					<option value="non-fiction">Non-Fiction</option>
					<option value="technology">Technology</option>
					<option value="science">Science</option>
					<option value="history">History</option>
				</select>
				<!-- <span class="error" th:if="${#fields.hasErrors('genre')}"
					th:errors="*{genre}"></span> -->
			</div>
			<br>
			<button type="submit">Save Book</button>
			<a th:href="@{/books}">Cancel</a>
		</form>
	</body>

</html>
