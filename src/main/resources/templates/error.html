<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <title>Error Page</title>
	    <style>
	        .error-container {
	            border: solid 1px #888;
	            padding: 20px;
	            margin: 20px;
	        }
	        .error-message {
	            color: red;
	        }
	    </style>
	</head>
	<body>
	    <div class="error-container">
	        <h1>Oops! Something went wrong.</h1>
	        
	        <p><strong>Status:</strong> <span th:text="${status}"></span></p>
	        <p><strong>Error:</strong> <span th:text="${error}"></span></p>
	        <p><strong>Message:</strong> <span th:text="${message}"></span></p>
	        <p><strong>Path:</strong> <span th:text="${path}"></span></p>
	        
	        <!-- Optionally show stack trace in development, controlled by application properties -->
	        <div th:if="${trace}">
	            <h3>Stack Trace:</h3>
	            <pre th:text="${trace}"></pre>
	        </div>
	    </div>
	</body>
</html>
